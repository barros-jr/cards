<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: deixa o app usar a tela toda (áreas seguras do iPhone) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fluência</title>
  <meta name="description" content="Flashcards para aprender idiomas com repetição espaçada." />

  <!-- Cor da barra do navegador / topo do app (segue claro/escuro) -->
  <meta name="theme-color" content="#15803d" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)" />
  <meta name="color-scheme" content="light dark" />

  <!-- PWA / manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Suporte de "Adicionar à Tela de Início" no iPhone (iOS) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fluência" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Ícone da aba do navegador -->
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />

  <!-- Fontes: Plus Jakarta Sans (interface) + Fraunces (serifada, marca) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Ícones de linha (Tabler) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- O JavaScript desenha tudo aqui dentro (barra do topo + telas). -->
  <div id="app">
    <noscript>
      <p style="padding:16px">Este app precisa de JavaScript ativado para funcionar.</p>
    </noscript>
  </div>

  <!-- Ponto de entrada (ES Module). Liga tudo e registra o service worker. -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
